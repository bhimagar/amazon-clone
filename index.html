<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon.com. Spend less. Smile more.</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <header>
        <div class="navbar">
            <a href="" class="nav-logo">
                <div class="logo border">
                </div>
            </a>

            <a href="" class="nav-address border">
                <p class="add-first">Deliver to</p>

                <div class="add-icon">
                    <i class="fa-solid fa-location-dot"></i>

                    <p class="add-second">Nepal</p>
                </div>
            </a>

            <div class="nav-search">
                <select class="search-select">
                    <option>All</option>
                </select>

                <input type="text" placeholder="Search Amazon" class="search-input">

                <div class="search-icon">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
            </div>

            <div class="nav-lang">
                <div class="lang-flag border">
                    <span class="lang-icon"><img src="/assets/icons/united-states.png" alt=""></span>

                    <p class="lang-p">EN</p>
                </div>

                <button class="lang-btn"><i class="fa-solid fa-sort-down"></i></button>
            </div>

            <div class="nav-signin border">
                <p><span>Hello, sign in</span></p>

                <p class="signin-second">Account & Lists</p>
            </div>

            <div class="nav-return border">
                <p><span>Returns</span></p>

                <p class="signin-second">& Orders</p>
            </div>

            <div class="nav-cart border">
                <i class="fa-solid fa-cart-shopping"></i>
                Cart
            </div>
        </div>

        <div class="panel">
            <div class="panel-all">
                <i class="fa-solid fa-bars"></i>
                All
            </div>

            <div class="panel-opt">
                <a href="">Today's Deals</a>
                <a href="">Gift Cards</a>
                <a href="">Sell</a>
                <a href="">Registry</a>
                <a href="">Prime Video</a>
                <a href="">Customer Service</a>
            </div>
        </div>
    </header>
</body>

</html>
